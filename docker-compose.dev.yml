services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: newsbot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d newsbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: node:20-slim
    working_dir: /app
    command: >
      sh -c "
        apt-get update -y && apt-get install -y openssl &&
        corepack enable && corepack prepare pnpm@latest --activate &&
        pnpm install &&
        pnpm --filter backend db:generate &&
        pnpm --filter backend db:migrate &&
        pnpm dev:backend
      "
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/newsbot
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - backend_node_modules:/app/packages/backend/node_modules
      - frontend_node_modules:/app/packages/frontend/node_modules
    ports:
      - "8806:8806"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:20-slim
    working_dir: /app
    environment:
      BACKEND_HOST: backend
    command: >
      sh -c "
        corepack enable && corepack prepare pnpm@latest --activate &&
        pnpm install &&
        pnpm dev:frontend
      "
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
      - backend_node_modules:/app/packages/backend/node_modules
      - frontend_node_modules:/app/packages/frontend/node_modules
    ports:
      - "3306:3306"
    depends_on:
      - backend

volumes:
  pgdata:
  node_modules:
  backend_node_modules:
  frontend_node_modules:
